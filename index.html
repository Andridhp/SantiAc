<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Academia Santi</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fredoka+One&display=swap');

  :root {
    --bg: #0f0c29;
    --bg2: #1a1640;
    --card: #1e1b4b;
    --card2: #252060;
    --accent: #7c3aed;
    --accent2: #a855f7;
    --gold: #fbbf24;
    --green: #10b981;
    --red: #ef4444;
    --blue: #3b82f6;
    --text: #f0edff;
    --muted: #8b83c4;
    --border: rgba(124,58,237,0.3);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ===== SCREENS ===== */
  .screen { display: none; min-height: 100vh; }
  .screen.active { display: flex; flex-direction: column; }

  /* ===== PROFILES ===== */
  #screen-profiles {
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
    background: radial-gradient(ellipse at top, #2d1b69 0%, #0f0c29 70%);
  }

  .profiles-logo {
    font-family: 'Fredoka One', cursive;
    font-size: 2.8rem;
    color: var(--gold);
    text-shadow: 0 0 30px rgba(251,191,36,0.5);
    margin-bottom: 0.2rem;
    text-align: center;
  }

  .profiles-sub {
    color: var(--muted);
    font-size: 0.95rem;
    margin-bottom: 2.5rem;
    text-align: center;
  }

  .profiles-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 1rem;
    justify-content: center;
    max-width: 400px;
    margin-bottom: 1.5rem;
  }

  .profile-card {
    background: var(--card);
    border: 2px solid var(--border);
    border-radius: 20px;
    padding: 1.2rem 1.5rem;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
    min-width: 120px;
    position: relative;
  }

  .profile-card:hover {
    border-color: var(--accent2);
    transform: translateY(-3px);
    box-shadow: 0 8px 24px rgba(124,58,237,0.3);
  }

  .profile-emoji { font-size: 2.4rem; margin-bottom: 0.4rem; }

  .profile-name {
    font-weight: 800;
    font-size: 1rem;
    color: var(--text);
  }

  .profile-stars {
    font-size: 0.75rem;
    color: var(--gold);
    margin-top: 0.2rem;
  }

  .profile-delete {
    position: absolute;
    top: 6px; right: 8px;
    background: none;
    border: none;
    color: var(--muted);
    font-size: 0.9rem;
    cursor: pointer;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .profile-card:hover .profile-delete { opacity: 1; }

  .btn-add-profile {
    background: none;
    border: 2px dashed var(--accent);
    border-radius: 20px;
    padding: 1.2rem 1.5rem;
    color: var(--accent2);
    font-family: 'Nunito', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    min-width: 120px;
  }
  .btn-add-profile:hover { background: rgba(124,58,237,0.1); transform: translateY(-3px); }

  /* ===== ADD PROFILE MODAL ===== */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }
  .modal-overlay.active { display: flex; }

  .modal {
    background: var(--card);
    border: 2px solid var(--border);
    border-radius: 24px;
    padding: 2rem;
    width: 100%;
    max-width: 340px;
  }

  .modal h3 {
    font-family: 'Fredoka One', cursive;
    font-size: 1.4rem;
    color: var(--gold);
    margin-bottom: 1.2rem;
    text-align: center;
  }

  .emoji-picker {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    justify-content: center;
    margin-bottom: 1rem;
  }

  .emoji-btn {
    font-size: 1.6rem;
    background: var(--card2);
    border: 2px solid transparent;
    border-radius: 12px;
    width: 48px; height: 48px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .emoji-btn.selected { border-color: var(--accent2); background: rgba(124,58,237,0.2); }

  .modal input {
    width: 100%;
    background: var(--card2);
    border: 2px solid var(--border);
    border-radius: 12px;
    padding: 0.7rem 1rem;
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    font-size: 1rem;
    margin-bottom: 1rem;
    outline: none;
  }
  .modal input:focus { border-color: var(--accent2); }

  .modal-btns { display: flex; gap: 0.7rem; }

  .btn { 
    flex: 1;
    padding: 0.7rem;
    border-radius: 12px;
    border: none;
    font-family: 'Nunito', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-primary { background: var(--accent); color: white; }
  .btn-primary:hover { background: var(--accent2); }
  .btn-secondary { background: var(--card2); color: var(--muted); }
  .btn-secondary:hover { color: var(--text); }

  /* ===== HOME ===== */
  #screen-home {
    background: radial-gradient(ellipse at top, #2d1b69 0%, #0f0c29 70%);
  }

  .home-header {
    padding: 1.2rem 1.2rem 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .user-pill {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 50px;
    padding: 0.4rem 0.9rem 0.4rem 0.5rem;
    cursor: pointer;
    transition: all 0.2s;
    font-size: 0.9rem;
    font-weight: 700;
  }
  .user-pill:hover { border-color: var(--accent2); }
  .user-pill-emoji { font-size: 1.3rem; }

  .home-xp {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    font-size: 0.9rem;
    font-weight: 700;
    color: var(--gold);
  }

  .home-hero {
    padding: 1.5rem 1.2rem 1rem;
    text-align: center;
  }

  .home-title {
    font-family: 'Fredoka One', cursive;
    font-size: 2.2rem;
    color: var(--gold);
    text-shadow: 0 0 24px rgba(251,191,36,0.4);
    line-height: 1;
    margin-bottom: 0.3rem;
  }

  .home-greeting {
    color: var(--muted);
    font-size: 0.95rem;
  }

  .subjects-grid {
    padding: 0 1rem 2rem;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.9rem;
  }

  .subject-card {
    background: var(--card);
    border: 2px solid var(--border);
    border-radius: 20px;
    padding: 1.1rem;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .subject-card::before {
    content: '';
    position: absolute;
    top: -30px; right: -30px;
    width: 80px; height: 80px;
    border-radius: 50%;
    opacity: 0.12;
  }

  .subject-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  }

  .subject-icon { font-size: 2rem; margin-bottom: 0.4rem; }

  .subject-name {
    font-weight: 800;
    font-size: 0.95rem;
    margin-bottom: 0.2rem;
  }

  .subject-progress-bar {
    height: 4px;
    background: rgba(255,255,255,0.1);
    border-radius: 4px;
    margin-top: 0.5rem;
    overflow: hidden;
  }

  .subject-progress-fill {
    height: 100%;
    border-radius: 4px;
    transition: width 0.5s;
  }

  .subject-progress-text {
    font-size: 0.72rem;
    color: var(--muted);
    margin-top: 0.3rem;
  }

  /* subject colors */
  .s-mat { border-color: rgba(59,130,246,0.4); }
  .s-mat::before { background: #3b82f6; }
  .s-mat .subject-progress-fill { background: #3b82f6; }
  .s-mat .subject-icon::after { }

  .s-esp { border-color: rgba(236,72,153,0.4); }
  .s-esp::before { background: #ec4899; }
  .s-esp .subject-progress-fill { background: #ec4899; }

  .s-cie { border-color: rgba(16,185,129,0.4); }
  .s-cie::before { background: #10b981; }
  .s-cie .subject-progress-fill { background: #10b981; }

  .s-fin { border-color: rgba(251,191,36,0.4); }
  .s-fin::before { background: #fbbf24; }
  .s-fin .subject-progress-fill { background: #fbbf24; }

  .s-soc { border-color: rgba(167,139,250,0.4); }
  .s-soc::before { background: #a78bfa; }
  .s-soc .subject-progress-fill { background: #a78bfa; }

  .s-ia { border-color: rgba(251,113,133,0.4); }
  .s-ia::before { background: #fb7185; }
  .s-ia .subject-progress-fill { background: #fb7185; }

  /* ===== SUBJECT SCREEN ===== */
  #screen-subject {
    background: var(--bg);
  }

  .subject-header {
    padding: 1rem 1.2rem;
    display: flex;
    align-items: center;
    gap: 0.8rem;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .back-btn {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 1.3rem;
    cursor: pointer;
    padding: 0.2rem;
    transition: color 0.2s;
  }
  .back-btn:hover { color: var(--text); }

  .subject-header-info { flex: 1; }
  .subject-header-icon { font-size: 1.6rem; }
  .subject-header-name {
    font-weight: 800;
    font-size: 1.1rem;
    margin: 0;
  }

  .topics-list {
    padding: 1rem;
    overflow-y: auto;
    flex: 1;
  }

  .topic-block {
    margin-bottom: 1rem;
    border-radius: 18px;
    overflow: hidden;
    border: 2px solid var(--border);
  }

  .topic-header {
    padding: 0.9rem 1rem;
    background: var(--card);
    display: flex;
    align-items: center;
    gap: 0.7rem;
  }

  .topic-num {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: var(--accent);
    color: white;
    font-size: 0.8rem;
    font-weight: 800;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .topic-name {
    font-weight: 800;
    font-size: 0.95rem;
    flex: 1;
  }

  .topic-stars {
    font-size: 0.8rem;
    color: var(--gold);
  }

  .topic-locked .topic-num {
    background: var(--card2);
    color: var(--muted);
  }

  .topic-locked .topic-name { color: var(--muted); }

  .levels-row {
    display: flex;
    padding: 0.7rem;
    gap: 0.5rem;
    background: var(--bg2);
  }

  .level-btn {
    flex: 1;
    border-radius: 12px;
    border: 2px solid var(--border);
    background: var(--card);
    color: var(--text);
    padding: 0.5rem 0.3rem;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
  }

  .level-btn:hover:not(.locked):not(.completed) {
    border-color: var(--accent2);
    background: rgba(124,58,237,0.15);
  }

  .level-btn.locked {
    opacity: 0.4;
    cursor: not-allowed;
  }

  .level-btn.completed {
    background: rgba(16,185,129,0.15);
    border-color: rgba(16,185,129,0.5);
  }

  .level-btn.current {
    border-color: var(--accent2);
    background: rgba(124,58,237,0.2);
    animation: pulse-border 2s infinite;
  }

  @keyframes pulse-border {
    0%, 100% { box-shadow: 0 0 0 0 rgba(168,85,247,0.3); }
    50% { box-shadow: 0 0 0 4px rgba(168,85,247,0.1); }
  }

  .level-btn-num {
    font-size: 0.7rem;
    font-weight: 800;
    color: var(--muted);
  }

  .level-btn-icon { font-size: 1.1rem; margin: 0.1rem 0; }

  .level-btn-stars {
    font-size: 0.65rem;
    color: var(--gold);
    min-height: 0.8rem;
  }

  /* ===== QUIZ SCREEN ===== */
  #screen-quiz {
    background: var(--bg);
  }

  .quiz-header {
    padding: 1rem 1.2rem;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
  }

  .quiz-header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 0.6rem;
  }

  .quiz-title {
    font-weight: 800;
    font-size: 0.9rem;
    color: var(--muted);
  }

  .hearts-row {
    display: flex;
    gap: 0.3rem;
    font-size: 1.2rem;
  }

  .progress-bar-quiz {
    height: 6px;
    background: rgba(255,255,255,0.1);
    border-radius: 6px;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 6px;
    transition: width 0.4s;
  }

  .quiz-body {
    flex: 1;
    padding: 1.2rem;
    display: flex;
    flex-direction: column;
    overflow-y: auto;
  }

  .question-box {
    background: var(--card);
    border: 2px solid var(--border);
    border-radius: 20px;
    padding: 1.3rem;
    margin-bottom: 1.2rem;
  }

  .question-level-badge {
    font-size: 0.72rem;
    font-weight: 800;
    color: var(--accent2);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 0.5rem;
  }

  .question-text {
    font-size: 1.05rem;
    font-weight: 700;
    line-height: 1.4;
  }

  .options-list {
    display: flex;
    flex-direction: column;
    gap: 0.6rem;
  }

  .option-btn {
    background: var(--card);
    border: 2px solid var(--border);
    border-radius: 14px;
    padding: 0.9rem 1.1rem;
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    text-align: left;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 0.7rem;
  }

  .option-btn:hover:not(:disabled) {
    border-color: var(--accent2);
    background: rgba(124,58,237,0.15);
  }

  .option-btn.correct {
    border-color: var(--green);
    background: rgba(16,185,129,0.2);
    color: #6ee7b7;
  }

  .option-btn.wrong {
    border-color: var(--red);
    background: rgba(239,68,68,0.2);
    color: #fca5a5;
  }

  .option-letter {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: var(--card2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.8rem;
    font-weight: 800;
    flex-shrink: 0;
  }

  .feedback-box {
    border-radius: 14px;
    padding: 0.9rem 1.1rem;
    margin-top: 0.8rem;
    font-weight: 700;
    font-size: 0.95rem;
    display: none;
  }

  .feedback-box.correct {
    background: rgba(16,185,129,0.15);
    border: 1px solid rgba(16,185,129,0.4);
    color: #6ee7b7;
    display: block;
  }

  .feedback-box.wrong {
    background: rgba(239,68,68,0.1);
    border: 1px solid rgba(239,68,68,0.3);
    color: #fca5a5;
    display: block;
  }

  .next-btn {
    margin-top: auto;
    padding-top: 1rem;
  }

  .btn-big {
    width: 100%;
    padding: 0.9rem;
    border-radius: 16px;
    border: none;
    font-family: 'Nunito', sans-serif;
    font-size: 1.05rem;
    font-weight: 800;
    cursor: pointer;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: white;
    transition: all 0.2s;
  }
  .btn-big:hover { opacity: 0.9; transform: translateY(-1px); }

  /* ===== RESULTS SCREEN ===== */
  #screen-results {
    align-items: center;
    justify-content: center;
    padding: 2rem 1.2rem;
    text-align: center;
    background: radial-gradient(ellipse at top, #2d1b69 0%, #0f0c29 70%);
  }

  .results-emoji { font-size: 4rem; margin-bottom: 0.5rem; }

  .results-title {
    font-family: 'Fredoka One', cursive;
    font-size: 2rem;
    color: var(--gold);
    margin-bottom: 0.3rem;
  }

  .results-subtitle { color: var(--muted); font-size: 0.95rem; margin-bottom: 1.5rem; }

  .results-stars {
    font-size: 2.5rem;
    margin-bottom: 0.5rem;
    letter-spacing: 0.1em;
  }

  .results-score {
    font-size: 1rem;
    color: var(--muted);
    margin-bottom: 1rem;
  }

  .results-xp {
    background: rgba(251,191,36,0.15);
    border: 1px solid rgba(251,191,36,0.3);
    border-radius: 12px;
    padding: 0.6rem 1.2rem;
    color: var(--gold);
    font-weight: 800;
    font-size: 0.95rem;
    margin-bottom: 1.5rem;
    display: inline-block;
  }

  .papa-msg {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1rem;
    font-size: 0.9rem;
    color: var(--text);
    line-height: 1.5;
    margin-bottom: 1.5rem;
    max-width: 320px;
  }

  .papa-msg strong { color: var(--gold); }

  .results-btns {
    display: flex;
    flex-direction: column;
    gap: 0.7rem;
    width: 100%;
    max-width: 320px;
  }

  .btn-outline {
    width: 100%;
    padding: 0.8rem;
    border-radius: 14px;
    border: 2px solid var(--border);
    background: none;
    color: var(--muted);
    font-family: 'Nunito', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-outline:hover { border-color: var(--accent2); color: var(--text); }

  /* ===== TOAST ===== */
  .toast {
    position: fixed;
    bottom: 1.5rem;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 50px;
    padding: 0.7rem 1.4rem;
    font-weight: 700;
    font-size: 0.9rem;
    z-index: 200;
    transition: transform 0.3s;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- PROFILES SCREEN -->
<div id="screen-profiles" class="screen active">
  <div class="profiles-logo">🏆 Academia</div>
  <div class="profiles-sub">¿Quién va a estudiar hoy?</div>
  <div class="profiles-grid" id="profiles-grid"></div>
  <button class="btn-add-profile" onclick="openAddProfile()">＋ Agregar usuario</button>
</div>

<!-- ADD PROFILE MODAL -->
<div class="modal-overlay" id="modal-add">
  <div class="modal">
    <h3>Nuevo usuario</h3>
    <div class="emoji-picker" id="emoji-picker"></div>
    <input type="text" id="new-profile-name" placeholder="Nombre..." maxlength="12">
    <div class="modal-btns">
      <button class="btn btn-secondary" onclick="closeAddProfile()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveNewProfile()">Guardar</button>
    </div>
  </div>
</div>

<!-- HOME SCREEN -->
<div id="screen-home" class="screen">
  <div class="home-header">
    <button class="user-pill" onclick="showScreen('profiles')">
      <span class="user-pill-emoji" id="current-emoji">🎮</span>
      <span id="current-name">Santi</span>
    </button>
    <div class="home-xp">⚡ <span id="current-xp">0</span> XP</div>
  </div>
  <div class="home-hero">
    <div class="home-title">¡A estudiar!</div>
    <div class="home-greeting" id="home-greeting">Elige una materia 👇</div>
  </div>
  <div class="subjects-grid" id="subjects-grid"></div>
</div>

<!-- SUBJECT SCREEN -->
<div id="screen-subject" class="screen">
  <div class="subject-header">
    <button class="back-btn" onclick="showScreen('home')">←</button>
    <div class="subject-header-icon" id="subj-icon">📐</div>
    <div class="subject-header-info">
      <div class="subject-header-name" id="subj-name">Matemáticas</div>
    </div>
  </div>
  <div class="topics-list" id="topics-list"></div>
</div>

<!-- QUIZ SCREEN -->
<div id="screen-quiz" class="screen">
  <div class="quiz-header">
    <div class="quiz-header-top">
      <div class="quiz-title" id="quiz-title">Nivel 1</div>
      <div class="hearts-row" id="hearts-row">❤️❤️❤️</div>
    </div>
    <div class="progress-bar-quiz">
      <div class="progress-bar-fill" id="quiz-progress" style="width:0%"></div>
    </div>
  </div>
  <div class="quiz-body">
    <div class="question-box">
      <div class="question-level-badge" id="q-badge">Nivel 1 · Reconocer</div>
      <div class="question-text" id="q-text">Pregunta...</div>

  profiles: [],

  currentTopicIdx: null,
  currentLevelIdx: null,
  // quiz state
  questions: [],

};

function getUserData(userId) {
  const key = `as3_${userId}`;
  const raw = localStorage.getItem(key);
  if (raw) return JSON.parse(raw);
  return { xp: 0, levels: {} };
}

function saveUserData(userId, data) {
  localStorage.setItem(`as3_${userId}`, JSON.stringify(data));
}

function getLevelKey(subjectId, topicIdx, levelIdx) {
  return `${subjectId}_${topicIdx}_${levelIdx}`;
}

function getLevelStars(userId, subjectId, topicIdx, levelIdx) {
  const data = getUserData(userId);
  return data.levels[getLevelKey(subjectId, topicIdx, levelIdx)] || 0;
}

function isLevelUnlocked(userId, subjectId, topicIdx, levelIdx) {
  if (topicIdx === 0 && levelIdx === 0) return true;
  // Check if previous level in same topic is done
  if (levelIdx > 0) {
    return getLevelStars(userId, subjectId, topicIdx, levelIdx - 1) > 0;
  }
  // First level of a topic: check if previous topic's last level is done
  if (topicIdx > 0) {
    const subj = SUBJECTS.find(s => s.id === subjectId);
    const prevTopic = subj.topics[topicIdx - 1];
    const lastLevel = prevTopic.levels.length - 1;
    return getLevelStars(userId, subjectId, topicIdx - 1, lastLevel) > 0;
  }
  return false;
}

function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
}

// =====================
// PROFILES
// =====================

function loadProfiles() {
  const raw = localStorage.getItem('as3_profiles');
  if (raw) {
    state.profiles = JSON.parse(raw);
  } else {
    state.profiles = [...DEFAULT_PROFILES];
    saveProfiles();
  }
  renderProfiles();
}

function saveProfiles() {
  localStorage.setItem('as3_profiles', JSON.stringify(state.profiles));
}

function renderProfiles() {
  const grid = document.getElementById('profiles-grid');
  grid.innerHTML = '';
  state.profiles.forEach(p => {
    const data = getUserData(p.id);
    const totalStars = Object.values(data.levels).reduce((a, b) => a + b, 0);
    const div = document.createElement('div');
    div.className = 'profile-card';
    div.innerHTML = `
      <div class="profile-emoji">${p.emoji}</div>
      <div class="profile-name">${p.name}</div>
      <div class="profile-stars">${totalStars > 0 ? '⭐ ' + totalStars : 'Nuevo'}</div>
      ${p.id !== 'santi' ? `<button class="profile-delete" onclick="deleteProfile('${p.id}',event)">✕</button>` : ''}
    `;
    div.addEventListener('click', () => selectProfile(p.id));
    grid.appendChild(div);
  });
}

function selectProfile(userId) {
  state.currentUserId = userId;
  const p = state.profiles.find(x => x.id === userId);
  document.getElementById('current-emoji').textContent = p.emoji;
  document.getElementById('current-name').textContent = p.name;
  const data = getUserData(userId);
  document.getElementById('current-xp').textContent = data.xp;
  renderSubjects();
  showScreen('home');
}

function deleteProfile(userId, e) {
  e.stopPropagation();
  if (!confirm('¿Eliminar este usuario?')) return;
  state.profiles = state.profiles.filter(p => p.id !== userId);
  saveProfiles();
  renderProfiles();
}

function openAddProfile() {
  state.selectedEmoji = EMOJIS[0];
  renderEmojiPicker();
  document.getElementById('new-profile-name').value = '';
  document.getElementById('modal-add').classList.add('active');
}

function closeAddProfile() {
  document.getElementById('modal-add').classList.remove('active');
}

function renderEmojiPicker() {
  const picker = document.getElementById('emoji-picker');
  picker.innerHTML = '';
  EMOJIS.forEach(e => {
    const btn = document.createElement('button');
    btn.className = 'emoji-btn' + (e === state.selectedEmoji ? ' selected' : '');
    btn.textContent = e;
    btn.addEventListener('click', () => {
      state.selectedEmoji = e;
      renderEmojiPicker();
    });
    picker.appendChild(btn);
  });
}

function saveNewProfile() {
  const name = document.getElementById('new-profile-name').value.trim();
  if (!name) { showToast('Escribe un nombre 👤'); return; }
  const id = 'user_' + Date.now();
  state.profiles.push({ id, name, emoji: state.selectedEmoji });
  saveProfiles();
  closeAddProfile();
  renderProfiles();
  showToast('¡Usuario creado! 🎉');
}

// =====================
// HOME / SUBJECTS
// =====================

function renderSubjects() {
  const grid = document.getElementById('subjects-grid');
  grid.innerHTML = '';
  const userId = state.currentUserId;

  SUBJECTS.forEach(s => {
    const data = getUserData(userId);
    let totalLevels = 0;
    let completedLevels = 0;
    s.topics.forEach((t, ti) => {
      t.levels.forEach((_, li) => {
        totalLevels++;
        if ((data.levels[getLevelKey(s.id, ti, li)] || 0) > 0) completedLevels++;
      });
    });
    const pct = totalLevels > 0 ? Math.round(completedLevels / totalLevels * 100) : 0;

    const card = document.createElement('div');
    card.className = `subject-card ${s.cls}`;
    card.innerHTML = `
      <div class="subject-icon">${s.icon}</div>
      <div class="subject-name">${s.name}</div>
      <div class="subject-progress-bar"><div class="subject-progress-fill" style="width:${pct}%"></div></div>
      <div class="subject-progress-text">${completedLevels}/${totalLevels} niveles</div>
    `;
    card.addEventListener('click', () => openSubject(s.id));
    grid.appendChild(card);
  });
}

// =====================
// SUBJECT
// =====================

function openSubject(subjectId) {
  state.currentSubjectId = subjectId;
  const subj = SUBJECTS.find(s => s.id === subjectId);
  document.getElementById('subj-icon').textContent = subj.icon;
  document.getElementById('subj-name').textContent = subj.name;
  renderTopics(subj);
  showScreen('subject');
}

function renderTopics(subj) {
  const list = document.getElementById('topics-list');
  list.innerHTML = '';
  const userId = state.currentUserId;

  subj.topics.forEach((topic, ti) => {
    const topicUnlocked = isLevelUnlocked(userId, subj.id, ti, 0);
    const topicStars = topic.levels.reduce((sum, _, li) =>
      sum + getLevelStars(userId, subj.id, ti, li), 0);

    const block = document.createElement('div');
    block.className = 'topic-block' + (!topicUnlocked ? ' topic-locked' : '');

    const levelsHTML = topic.levels.map((_, li) => {
      const stars = getLevelStars(userId, subj.id, ti, li);
      const unlocked = isLevelUnlocked(userId, subj.id, ti, li);
      const isCurrent = unlocked && stars === 0;

      let cls = 'level-btn';
      if (!unlocked) cls += ' locked';
      else if (stars > 0) cls += ' completed';
      else cls += ' current';

      const icon = !unlocked ? '🔒' : stars > 0 ? '✅' : `${li + 1}`;
      const starsDisplay = stars > 0 ? '⭐'.repeat(stars) : '';

      return `<button class="${cls}" ${unlocked ? `onclick="startLevel('${subj.id}',${ti},${li})"` : ''}>
        <div class="level-btn-num">Nv${li + 1}</div>
        <div class="level-btn-icon">${icon}</div>
        <div class="level-btn-stars">${starsDisplay}</div>
      </button>`;
    }).join('');

    block.innerHTML = `
      <div class="topic-header">
        <div class="topic-num">${topicUnlocked ? (ti + 1) : '🔒'}</div>
        <div class="topic-name">${topic.name}</div>
        ${topicStars > 0 ? `<div class="topic-stars">${'⭐'.repeat(topicStars)}</div>` : ''}
      </div>
      <div class="levels-row">${levelsHTML}</div>
    `;
    list.appendChild(block);
  });
}

// =====================
// QUIZ
// =====================

function startLevel(subjectId, topicIdx, levelIdx) {
  state.currentSubjectId = subjectId;
  state.currentTopicIdx = topicIdx;
  state.currentLevelIdx = levelIdx;

  const subj = SUBJECTS.find(s => s.id === subjectId);
  const topic = subj.topics[topicIdx];
  state.questions = [...topic.levels[levelIdx]];
  state.questionIdx = 0;
  state.hearts = 3;
  state.correct = 0;
  state.answered = false;

  const subName = `${topic.name} · ${LEVEL_LABELS[levelIdx]}`;
  document.getElementById('quiz-title').textContent = subName;

  showScreen('quiz');
  renderQuestion();
}

function renderQuestion() {
  const q = state.questions[state.questionIdx];
  const total = state.questions.length;

  document.getElementById('quiz-progress').style.width =
    ((state.questionIdx) / total * 100) + '%';

  const subj = SUBJECTS.find(s => s.id === state.currentSubjectId);
  const topic = subj.topics[state.currentTopicIdx];
  document.getElementById('q-badge').textContent =
    `${topic.name} · Nivel ${state.currentLevelIdx + 1} · ${LEVEL_LABELS[state.currentLevelIdx]}`;
  document.getElementById('q-text').textContent = q.q;

  const hearts = '❤️'.repeat(state.hearts) + (state.hearts < 3 ? '🖤'.repeat(3 - state.hearts) : '');
  document.getElementById('hearts-row').textContent = hearts;

  const optList = document.getElementById('options-list');
  optList.innerHTML = '';
  const letters = ['A','B','C','D'];

  q.opts.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = `<span class="option-letter">${letters[i]}</span> ${opt}`;
    btn.addEventListener('click', () => selectOption(i));
    optList.appendChild(btn);
  });

  document.getElementById('feedback-box').className = 'feedback-box';
  document.getElementById('feedback-box').textContent = '';
  document.getElementById('next-btn').style.display = 'none';
  state.answered = false;
}

function selectOption(optIdx) {
  if (state.answered) return;
  state.answered = true;

  const q = state.questions[state.questionIdx];
  const opts = document.querySelectorAll('.option-btn');
  opts.forEach(b => b.disabled = true);

  const feedback = document.getElementById('feedback-box');

  if (optIdx === q.ans) {
    opts[optIdx].classList.add('correct');
    state.correct++;
    feedback.className = 'feedback-box correct';
    feedback.textContent = '✅ ¡Correcto!';
  } else {
    opts[optIdx].classList.add('wrong');
    opts[q.ans].classList.add('correct');
    state.hearts--;
    feedback.className = 'feedback-box wrong';
    feedback.textContent = `❌ Respuesta correcta: ${q.opts[q.ans]}`;

    if (state.hearts <= 0) {
      setTimeout(() => endQuiz(false), 1200);
      return;
    }
  }

  document.getElementById('next-btn').style.display = 'block';

  if (state.questionIdx >= state.questions.length - 1) {
    document.getElementById('next-btn').textContent = 'Ver resultados 🏆';
  }
}

function nextQuestion() {
  state.questionIdx++;
  if (state.questionIdx >= state.questions.length) {
    endQuiz(true);
  } else {
    renderQuestion();
  }
}

function endQuiz(completed) {
  const total = state.questions.length;
  const correct = state.correct;
  const pct = correct / total;

  let stars = 0;
  if (completed) {
    if (pct >= 0.9) stars = 3;
    else if (pct >= 0.7) stars = 2;
    else if (pct >= 0.5) stars = 1;
  }

  const xpMap = [0, 50, 100, 150];
  const xpEarned = xpMap[stars];

  // Save results
  const userId = state.currentUserId;
  const data = getUserData(userId);
  const key = getLevelKey(state.currentSubjectId, state.currentTopicIdx, state.currentLevelIdx);
  const prevStars = data.levels[key] || 0;

  if (stars > prevStars) {
    data.levels[key] = stars;
    data.xp = (data.xp || 0) + (xpEarned - xpMap[prevStars]);
    saveUserData(userId, data);
    document.getElementById('current-xp').textContent = data.xp;
  }

  // Show results
  const emojis = ['😓','😐','😊','🌟'];
  const titles = ['¡Sigue intentando!','¡No está mal!','¡Bien hecho!','¡Excelente!'];

  document.getElementById('results-emoji').textContent = completed ? emojis[stars] : '💔';
  document.getElementById('results-title').textContent = completed ? titles[stars] : '¡Sin vidas!';
  document.getElementById('results-subtitle').textContent =
    completed ? `Nivel ${state.currentLevelIdx + 1} completado` : 'Se acabaron los corazones';
  document.getElementById('results-stars').textContent = stars > 0 ? '⭐'.repeat(stars) : '☆☆☆';
  document.getElementById('results-score').textContent = `${correct}/${total} correctas`;
  document.getElementById('results-xp').textContent = xpEarned > 0 ? `+${xpEarned} XP` : '0 XP';

  // Papa messages
  const msgs = [
    [`Santi, no te preocupes. <strong>Cada intento te hace más fuerte.</strong> ¡Inténtalo de nuevo, campeón!`,
     `Santi, el Real Madrid también pierde partidos... <strong>¡pero siempre vuelve más fuerte!</strong> ¡Tú puedes!`],
    [`Bien Santi, vas avanzando. <strong>Con más práctica lo dominarás.</strong> ¡Tú puedes más!`,
     `¡Vamos Santi! El esfuerzo se nota. <strong>Sigue practicando y llegarás al nivel de Mbappé.</strong> 💪`],
    [`¡Muy bien Santi! <strong>Estás progresando de verdad.</strong> Papá está orgulloso de ti. 🌟`,
     `¡Excelente trabajo! <strong>Así se hace, con dedicación.</strong> Papá te ve y sonríe. ⚽❤️`],
    [`¡CRACK! <strong>Eso es nivel Real Madrid, hijo.</strong> Papá está súper orgulloso. ¡Tres estrellitas! 🏆⭐⭐⭐`,
     `¡GOLAZO ACADÉMICO! <strong>Eres el Mbappé de las matemáticas.</strong> Papá te quiere muchísimo. 🌟`]
  ];

  const msgList = msgs[stars];
  document.getElementById('papa-msg').innerHTML = '💬 ' + msgList[Math.floor(Math.random() * msgList.length)];

  // Next button
  const subj = SUBJECTS.find(s => s.id === state.currentSubjectId);
  const topic = subj.topics[state.currentTopicIdx];
  const hasNext = state.currentLevelIdx < topic.levels.length - 1 ||
                  state.currentTopicIdx < subj.topics.length - 1;

  const nextBtn = document.getElementById('results-next-btn');
  if (stars > 0 && hasNext) {
    nextBtn.style.display = 'block';
    nextBtn.textContent = 'Siguiente nivel →';
  } else if (stars === 0) {
    nextBtn.style.display = 'block';
    nextBtn.textContent = 'Intentar de nuevo 🔄';
  } else {
    nextBtn.style.display = 'none';
  }

  showScreen('results');
}

function continueAfterResults() {
  const stars = getLevelStars(state.currentUserId, state.currentSubjectId,
    state.currentTopicIdx, state.currentLevelIdx);

  if (stars === 0) {
    // Retry
    startLevel(state.currentSubjectId, state.currentTopicIdx, state.currentLevelIdx);
    return;
  }

  const subj = SUBJECTS.find(s => s.id === state.currentSubjectId);

  // Next level in same topic
  if (state.currentLevelIdx < subj.topics[state.currentTopicIdx].levels.length - 1) {
    startLevel(state.currentSubjectId, state.currentTopicIdx, state.currentLevelIdx + 1);
  } else if (state.currentTopicIdx < subj.topics.length - 1) {
    // First level of next topic
    startLevel(state.currentSubjectId, state.currentTopicIdx + 1, 0);
  } else {
    goToSubject();
  }
}

function goToSubject() {
  const subj = SUBJECTS.find(s => s.id === state.currentSubjectId);
  openSubject(state.currentSubjectId);
}

// =====================
// TOAST
// =====================

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// =====================
// INIT
// =====================

loadProfiles();
</script>
