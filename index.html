<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Academia Santi</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fredoka+One&display=swap');

  :root {
    --bg: #0f0c29;
    --bg2: #1a1640;
    --card: #1e1b4b;
    --card2: #252060;
    --accent: #7c3aed;
    --accent2: #a855f7;
    --gold: #fbbf24;
    --green: #10b981;
    --red: #ef4444;
    --blue: #3b82f6;
    --text: #f0edff;
    --muted: #8b83c4;
    --border: rgba(124,58,237,0.3);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ===== SCREENS ===== */
  .screen { display: none; min-height: 100vh; }
  .screen.active { display: flex; flex-direction: column; }

  /* ===== PROFILES ===== */
  #screen-profiles {
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
    background: radial-gradient(ellipse at top, #2d1b69 0%, #0f0c29 70%);
  }

  .profiles-logo {
    font-family: 'Fredoka One', cursive;
    font-size: 2.8rem;
    color: var(--gold);
    text-shadow: 0 0 30px rgba(251,191,36,0.5);
    margin-bottom: 0.2rem;
    text-align: center;
  }

  .profiles-sub {
    color: var(--muted);
    font-size: 0.95rem;
    margin-bottom: 2.5rem;
    text-align: center;
  }

  .profiles-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 1rem;
    justify-content: center;
    max-width: 400px;
    margin-bottom: 1.5rem;
  }

  .profile-card {
    background: var(--card);
    border: 2px solid var(--border);
    border-radius: 20px;
    padding: 1.2rem 1.5rem;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
    min-width: 120px;
    position: relative;
  }

  .profile-card:hover {
    border-color: var(--accent2);
    transform: translateY(-3px);
    box-shadow: 0 8px 24px rgba(124,58,237,0.3);
  }

  .profile-emoji { font-size: 2.4rem; margin-bottom: 0.4rem; }

  .profile-name {
    font-weight: 800;
    font-size: 1rem;
    color: var(--text);
  }

  .profile-stars {
    font-size: 0.75rem;
    color: var(--gold);
    margin-top: 0.2rem;
  }

  .profile-delete {
    position: absolute;
    top: 6px; right: 8px;
    background: none;
    border: none;
    color: var(--muted);
    font-size: 0.9rem;
    cursor: pointer;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .profile-card:hover .profile-delete { opacity: 1; }

  .btn-add-profile {
    background: none;
    border: 2px dashed var(--accent);
    border-radius: 20px;
    padding: 1.2rem 1.5rem;
    color: var(--accent2);
    font-family: 'Nunito', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    min-width: 120px;
  }
  .btn-add-profile:hover { background: rgba(124,58,237,0.1); transform: translateY(-3px); }

  /* ===== ADD PROFILE MODAL ===== */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }
  .modal-overlay.active { display: flex; }

  .modal {
    background: var(--card);
    border: 2px solid var(--border);
    border-radius: 24px;
    padding: 2rem;
    width: 100%;
    max-width: 340px;
  }

  .modal h3 {
    font-family: 'Fredoka One', cursive;
    font-size: 1.4rem;
    color: var(--gold);
    margin-bottom: 1.2rem;
    text-align: center;
  }

  .emoji-picker {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    justify-content: center;
    margin-bottom: 1rem;
  }

  .emoji-btn {
    font-size: 1.6rem;
    background: var(--card2);
    border: 2px solid transparent;
    border-radius: 12px;
    width: 48px; height: 48px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .emoji-btn.selected { border-color: var(--accent2); background: rgba(124,58,237,0.2); }

  .modal input {
    width: 100%;
    background: var(--card2);
    border: 2px solid var(--border);
    border-radius: 12px;
    padding: 0.7rem 1rem;
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    font-size: 1rem;
    margin-bottom: 1rem;
    outline: none;
  }
  .modal input:focus { border-color: var(--accent2); }

  .modal-btns { display: flex; gap: 0.7rem; }

  .btn { 
    flex: 1;
    padding: 0.7rem;
    border-radius: 12px;
    border: none;
    font-family: 'Nunito', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-primary { background: var(--accent); color: white; }
  .btn-primary:hover { background: var(--accent2); }
  .btn-secondary { background: var(--card2); color: var(--muted); }
  .btn-secondary:hover { color: var(--text); }

  /* ===== HOME ===== */
  #screen-home {
    background: radial-gradient(ellipse at top, #2d1b69 0%, #0f0c29 70%);
  }

  .home-header {
    padding: 1.2rem 1.2rem 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .user-pill {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 50px;
    padding: 0.4rem 0.9rem 0.4rem 0.5rem;
    cursor: pointer;
    transition: all 0.2s;
    font-size: 0.9rem;
    font-weight: 700;
  }
  .user-pill:hover { border-color: var(--accent2); }
  .user-pill-emoji { font-size: 1.3rem; }

  .home-xp {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    font-size: 0.9rem;
    font-weight: 700;
    color: var(--gold);
  }

  .home-hero {
    padding: 1.5rem 1.2rem 1rem;
    text-align: center;
  }

  .home-title {
    font-family: 'Fredoka One', cursive;
    font-size: 2.2rem;
    color: var(--gold);
    text-shadow: 0 0 24px rgba(251,191,36,0.4);
    line-height: 1;
    margin-bottom: 0.3rem;
  }

  .home-greeting {
    color: var(--muted);
    font-size: 0.95rem;
  }

  .subjects-grid {
    padding: 0 1rem 2rem;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.9rem;
  }

  .subject-card {
    background: var(--card);
    border: 2px solid var(--border);
    border-radius: 20px;
    padding: 1.1rem;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .subject-card::before {
    content: '';
    position: absolute;
    top: -30px; right: -30px;
    width: 80px; height: 80px;
    border-radius: 50%;
    opacity: 0.12;
  }

  .subject-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  }

  .subject-icon { font-size: 2rem; margin-bottom: 0.4rem; }

  .subject-name {
    font-weight: 800;
    font-size: 0.95rem;
    margin-bottom: 0.2rem;
  }

  .subject-progress-bar {
    height: 4px;
    background: rgba(255,255,255,0.1);
    border-radius: 4px;
    margin-top: 0.5rem;
    overflow: hidden;
  }

  .subject-progress-fill {
    height: 100%;
    border-radius: 4px;
    transition: width 0.5s;
  }

  .subject-progress-text {
    font-size: 0.72rem;
    color: var(--muted);
    margin-top: 0.3rem;
  }

  /* subject colors */
  .s-mat { border-color: rgba(59,130,246,0.4); }
  .s-mat::before { background: #3b82f6; }
  .s-mat .subject-progress-fill { background: #3b82f6; }
  .s-mat .subject-icon::after { }

  .s-esp { border-color: rgba(236,72,153,0.4); }
  .s-esp::before { background: #ec4899; }
  .s-esp .subject-progress-fill { background: #ec4899; }

  .s-cie { border-color: rgba(16,185,129,0.4); }
  .s-cie::before { background: #10b981; }
  .s-cie .subject-progress-fill { background: #10b981; }

  .s-fin { border-color: rgba(251,191,36,0.4); }
  .s-fin::before { background: #fbbf24; }
  .s-fin .subject-progress-fill { background: #fbbf24; }

  .s-soc { border-color: rgba(167,139,250,0.4); }
  .s-soc::before { background: #a78bfa; }
  .s-soc .subject-progress-fill { background: #a78bfa; }

  .s-ia { border-color: rgba(251,113,133,0.4); }
  .s-ia::before { background: #fb7185; }
  .s-ia .subject-progress-fill { background: #fb7185; }

  /* ===== SUBJECT SCREEN ===== */
  #screen-subject {
    background: var(--bg);
  }

  .subject-header {
    padding: 1rem 1.2rem;
    display: flex;
    align-items: center;
    gap: 0.8rem;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .back-btn {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 1.3rem;
    cursor: pointer;
    padding: 0.2rem;
    transition: color 0.2s;
  }
  .back-btn:hover { color: var(--text); }

  .subject-header-info { flex: 1; }
  .subject-header-icon { font-size: 1.6rem; }
  .subject-header-name {
    font-weight: 800;
    font-size: 1.1rem;
    margin: 0;
  }

  .topics-list {
    padding: 1rem;
    overflow-y: auto;
    flex: 1;
  }

  .topic-block {
    margin-bottom: 1rem;
    border-radius: 18px;
    overflow: hidden;
    border: 2px solid var(--border);
  }

  .topic-header {
    padding: 0.9rem 1rem;
    background: var(--card);
    display: flex;
    align-items: center;
    gap: 0.7rem;
  }

  .topic-num {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: var(--accent);
    color: white;
    font-size: 0.8rem;
    font-weight: 800;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .topic-name {
    font-weight: 800;
    font-size: 0.95rem;
    flex: 1;
  }

  .topic-stars {
    font-size: 0.8rem;
    color: var(--gold);
  }

  .topic-locked .topic-num {
    background: var(--card2);
    color: var(--muted);
  }

  .topic-locked .topic-name { color: var(--muted); }

  .levels-row {
    display: flex;
    padding: 0.7rem;
    gap: 0.5rem;
    background: var(--bg2);
  }

  .level-btn {
    flex: 1;
    border-radius: 12px;
    border: 2px solid var(--border);
    background: var(--card);
    color: var(--text);
    padding: 0.5rem 0.3rem;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
  }

  .level-btn:hover:not(.locked):not(.completed) {
    border-color: var(--accent2);
    background: rgba(124,58,237,0.15);
  }

  .level-btn.locked {
    opacity: 0.4;
    cursor: not-allowed;
  }

  .level-btn.completed {
    background: rgba(16,185,129,0.15);
    border-color: rgba(16,185,129,0.5);
  }

  .level-btn.current {
    border-color: var(--accent2);
    background: rgba(124,58,237,0.2);
    animation: pulse-border 2s infinite;
  }

  @keyframes pulse-border {
    0%, 100% { box-shadow: 0 0 0 0 rgba(168,85,247,0.3); }
    50% { box-shadow: 0 0 0 4px rgba(168,85,247,0.1); }
  }

  .level-btn-num {
    font-size: 0.7rem;
    font-weight: 800;
    color: var(--muted);
  }

  .level-btn-icon { font-size: 1.1rem; margin: 0.1rem 0; }

  .level-btn-stars {
    font-size: 0.65rem;
    color: var(--gold);
    min-height: 0.8rem;
  }

  /* ===== QUIZ SCREEN ===== */
  #screen-quiz {
    background: var(--bg);
  }

  .quiz-header {
    padding: 1rem 1.2rem;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
  }

  .quiz-header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 0.6rem;
  }

  .quiz-title {
    font-weight: 800;
    font-size: 0.9rem;
    color: var(--muted);
  }

  .hearts-row {
    display: flex;
    gap: 0.3rem;
    font-size: 1.2rem;
  }

  .progress-bar-quiz {
    height: 6px;
    background: rgba(255,255,255,0.1);
    border-radius: 6px;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 6px;
    transition: width 0.4s;
  }

  .quiz-body {
    flex: 1;
    padding: 1.2rem;
    display: flex;
    flex-direction: column;
    overflow-y: auto;
  }

  .question-box {
    background: var(--card);
    border: 2px solid var(--border);
    border-radius: 20px;
    padding: 1.3rem;
    margin-bottom: 1.2rem;
  }

  .question-level-badge {
    font-size: 0.72rem;
    font-weight: 800;
    color: var(--accent2);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 0.5rem;
  }

  .question-text {
    font-size: 1.05rem;
    font-weight: 700;
    line-height: 1.4;
  }

  .options-list {
    display: flex;
    flex-direction: column;
    gap: 0.6rem;
  }

  .option-btn {
    background: var(--card);
    border: 2px solid var(--border);
    border-radius: 14px;
    padding: 0.9rem 1.1rem;
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    text-align: left;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 0.7rem;
  }

  .option-btn:hover:not(:disabled) {
    border-color: var(--accent2);
    background: rgba(124,58,237,0.15);
  }

  .option-btn.correct {
    border-color: var(--green);
    background: rgba(16,185,129,0.2);
    color: #6ee7b7;
  }

  .option-btn.wrong {
    border-color: var(--red);
    background: rgba(239,68,68,0.2);
    color: #fca5a5;
  }

  .option-letter {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: var(--card2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.8rem;
    font-weight: 800;
    flex-shrink: 0;
  }

  .feedback-box {
    border-radius: 14px;
    padding: 0.9rem 1.1rem;
    margin-top: 0.8rem;
    font-weight: 700;
    font-size: 0.95rem;
    display: none;
  }

  .feedback-box.correct {
    background: rgba(16,185,129,0.15);
    border: 1px solid rgba(16,185,129,0.4);
    color: #6ee7b7;
    display: block;
  }

  .feedback-box.wrong {
    background: rgba(239,68,68,0.1);
    border: 1px solid rgba(239,68,68,0.3);
    color: #fca5a5;
    display: block;
  }

  .next-btn {
    margin-top: auto;
    padding-top: 1rem;
  }

  .btn-big {
    width: 100%;
    padding: 0.9rem;
    border-radius: 16px;
    border: none;
    font-family: 'Nunito', sans-serif;
    font-size: 1.05rem;
    font-weight: 800;
    cursor: pointer;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: white;
    transition: all 0.2s;
  }
  .btn-big:hover { opacity: 0.9; transform: translateY(-1px); }

  /* ===== RESULTS SCREEN ===== */
  #screen-results {
    align-items: center;
    justify-content: center;
    padding: 2rem 1.2rem;
    text-align: center;
    background: radial-gradient(ellipse at top, #2d1b69 0%, #0f0c29 70%);
  }

  .results-emoji { font-size: 4rem; margin-bottom: 0.5rem; }

  .results-title {
    font-family: 'Fredoka One', cursive;
    font-size: 2rem;
    color: var(--gold);
    margin-bottom: 0.3rem;
  }

  .results-subtitle { color: var(--muted); font-size: 0.95rem; margin-bottom: 1.5rem; }

  .results-stars {
    font-size: 2.5rem;
    margin-bottom: 0.5rem;
    letter-spacing: 0.1em;
  }

  .results-score {
    font-size: 1rem;
    color: var(--muted);
    margin-bottom: 1rem;
  }

  .results-xp {
    background: rgba(251,191,36,0.15);
    border: 1px solid rgba(251,191,36,0.3);
    border-radius: 12px;
    padding: 0.6rem 1.2rem;
    color: var(--gold);
    font-weight: 800;
    font-size: 0.95rem;
    margin-bottom: 1.5rem;
    display: inline-block;
  }

  .papa-msg {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1rem;
    font-size: 0.9rem;
    color: var(--text);
    line-height: 1.5;
    margin-bottom: 1.5rem;
    max-width: 320px;
  }

  .papa-msg strong { color: var(--gold); }

  .results-btns {
    display: flex;
    flex-direction: column;
    gap: 0.7rem;
    width: 100%;
    max-width: 320px;
  }

  .btn-outline {
    width: 100%;
    padding: 0.8rem;
    border-radius: 14px;
    border: 2px solid var(--border);
    background: none;
    color: var(--muted);
    font-family: 'Nunito', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-outline:hover { border-color: var(--accent2); color: var(--text); }

  /* ===== TOAST ===== */
  .toast {
    position: fixed;
    bottom: 1.5rem;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 50px;
    padding: 0.7rem 1.4rem;
    font-weight: 700;
    font-size: 0.9rem;
    z-index: 200;
    transition: transform 0.3s;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* ===== PAPA BTN ===== */
  .papa-btn {
    background: rgba(251,191,36,0.15);
    border: 2px solid rgba(251,191,36,0.4);
    border-radius: 50px;
    padding: 0.35rem 0.7rem;
    font-size: 1.2rem;
    cursor: pointer;
    transition: all 0.2s;
  }
  .papa-btn:hover { background: rgba(251,191,36,0.3); transform: scale(1.1); }

  /* ===== PAPA DASHBOARD ===== */
  #screen-papa { background: var(--bg); }

  .papa-header {
    padding: 1rem 1.2rem;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 0.8rem;
    position: sticky; top: 0; z-index: 10;
  }
  .papa-header-title { flex: 1; font-weight: 800; font-size: 1.05rem; }
  .papa-header-user {
    font-size: 0.85rem;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 50px;
    padding: 0.3rem 0.8rem;
    color: var(--muted);
  }

  .papa-body { padding: 1rem; overflow-y: auto; flex: 1; }

  .papa-section { margin-bottom: 1.2rem; }

  .papa-section-title {
    font-size: 0.75rem;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    margin-bottom: 0.6rem;
  }

  /* Hero card */
  .papa-hero {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 20px;
    padding: 1.2rem;
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-bottom: 1.2rem;
  }
  .papa-hero-emoji { font-size: 3rem; }
  .papa-hero-info { flex: 1; }
  .papa-hero-name { font-weight: 800; font-size: 1.1rem; color: white; }
  .papa-hero-xp { font-size: 0.9rem; color: rgba(255,255,255,0.8); margin-top: 0.2rem; }
  .papa-hero-level {
    background: rgba(255,255,255,0.2);
    border-radius: 50px;
    padding: 0.5rem 1rem;
    font-weight: 800;
    font-size: 0.9rem;
    color: white;
    text-align: center;
  }

  /* Stats row */
  .papa-stats {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 0.6rem;
    margin-bottom: 1.2rem;
  }
  .papa-stat {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 0.8rem 0.5rem;
    text-align: center;
  }
  .papa-stat-val { font-size: 1.4rem; font-weight: 900; color: var(--gold); }
  .papa-stat-label { font-size: 0.68rem; color: var(--muted); margin-top: 0.2rem; font-weight: 700; }

  /* Subject progress */
  .papa-subject-row {

    padding: 0.8rem 1rem;
    margin-bottom: 0.5rem;

    gap: 0.6rem;
    margin-bottom: 0.5rem;

    height: 6px;
    background: rgba(255,255,255,0.08);
    border-radius: 6px;
    overflow: hidden;
  }
  .papa-subject-fill { height: 100%; border-radius: 6px; transition: width 0.6s; }

  /* Weak/strong areas */
  .papa-area-card {
    background: var(--card);
    border-radius: 14px;
    padding: 0.8rem 1rem;
    margin-bottom: 0.5rem;
    display: flex;
    align-items: center;
    gap: 0.7rem;
    border: 1px solid var(--border);
  }
  .papa-area-badge {
    width: 32px; height: 32px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 1rem;
    flex-shrink: 0;
  }
  .papa-area-badge.weak { background: rgba(239,68,68,0.2); }
  .papa-area-badge.strong { background: rgba(16,185,129,0.2); }

  .papa-area-name { font-weight: 800; font-size: 0.9rem; }
  .papa-area-detail { font-size: 0.75rem; color: var(--muted); margin-top: 0.1rem; }
  .papa-area-stars { font-size: 0.85rem; color: var(--gold); }

  /* Days studied */
  .papa-days-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem;
  }
  .papa-day-chip {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.3rem 0.6rem;
    font-size: 0.75rem;
    font-weight: 700;
    color: var(--muted);
  }
  .papa-day-chip.studied {
    background: rgba(16,185,129,0.15);
    border-color: rgba(16,185,129,0.4);
    color: #6ee7b7;
  }

  .papa-empty {
    text-align: center;
    padding: 2rem;
    color: var(--muted);
    font-size: 0.95rem;
  }

  /* ===== PREMIUM ANIMATIONS & POLISH ===== */

  /* Screen transitions */
  .screen {
    animation: none;
    opacity: 1;
  }
  .screen.active {
    animation: screenIn 0.35s cubic-bezier(0.22, 1, 0.36, 1) forwards;
  }
  @keyframes screenIn {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Profile cards stagger */
  .profile-card {
    animation: cardPop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) both;
  }
  .profile-card:nth-child(1) { animation-delay: 0.05s; }
  .profile-card:nth-child(2) { animation-delay: 0.12s; }
  .profile-card:nth-child(3) { animation-delay: 0.19s; }
  .profile-card:nth-child(4) { animation-delay: 0.26s; }
  @keyframes cardPop {
    from { opacity: 0; transform: scale(0.85) translateY(12px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }

  /* Subject cards stagger */
  .subject-card {
    animation: cardPop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) both;
  }
  .subject-card:nth-child(1) { animation-delay: 0.04s; }
  .subject-card:nth-child(2) { animation-delay: 0.1s; }
  .subject-card:nth-child(3) { animation-delay: 0.16s; }
  .subject-card:nth-child(4) { animation-delay: 0.22s; }
  .subject-card:nth-child(5) { animation-delay: 0.28s; }
  .subject-card:nth-child(6) { animation-delay: 0.34s; }

  /* Option buttons */
  .option-btn {
    transition: all 0.18s cubic-bezier(0.22, 1, 0.36, 1);
    transform: translateX(0);
  }
  .option-btn:active:not(:disabled) {
    transform: scale(0.97);
  }
  .option-btn.correct {
    animation: correctPulse 0.5s cubic-bezier(0.22, 1, 0.36, 1);
  }
  .option-btn.wrong {
    animation: wrongShake 0.45s cubic-bezier(0.22, 1, 0.36, 1);
  }
  @keyframes correctPulse {
    0%   { transform: scale(1); }
    40%  { transform: scale(1.03); }
    100% { transform: scale(1); }
  }
  @keyframes wrongShake {
    0%   { transform: translateX(0); }
    20%  { transform: translateX(-7px); }
    40%  { transform: translateX(7px); }
    60%  { transform: translateX(-5px); }
    80%  { transform: translateX(5px); }
    100% { transform: translateX(0); }
  }

  /* Logo pulse on profiles screen */
  .profiles-logo {
    animation: logoBreathe 3s ease-in-out infinite;
  }
  @keyframes logoBreathe {
    0%, 100% { text-shadow: 0 0 30px rgba(251,191,36,0.5); }
    50%       { text-shadow: 0 0 50px rgba(251,191,36,0.85), 0 0 80px rgba(251,191,36,0.3); }
  }

  /* Results screen stars */
  .results-stars {
    animation: starsBounce 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) 0.2s both;
  }
  @keyframes starsBounce {
    from { opacity: 0; transform: scale(0.4); }
    to   { opacity: 1; transform: scale(1); }
  }
  .results-emoji {
    animation: emojiDrop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both;
  }
  @keyframes emojiDrop {
    from { opacity: 0; transform: translateY(-30px) scale(0.6); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }
  .results-title {
    animation: fadeUp 0.45s ease 0.1s both;
  }
  .results-xp {
    animation: fadeUp 0.45s ease 0.3s both;
  }
  .papa-msg {
    animation: fadeUp 0.45s ease 0.4s both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Confetti canvas */
  #confetti-canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 50;
  }

  /* Question box slide-in */
  .question-box {
    animation: fadeUp 0.3s ease both;
  }
  .options-list .option-btn {
    animation: fadeUp 0.3s ease both;
  }
  .options-list .option-btn:nth-child(1) { animation-delay: 0.05s; }
  .options-list .option-btn:nth-child(2) { animation-delay: 0.1s; }
  .options-list .option-btn:nth-child(3) { animation-delay: 0.15s; }
  .options-list .option-btn:nth-child(4) { animation-delay: 0.2s; }

  /* Progress bar animated fill */
  .subject-progress-fill {
    transition: width 0.8s cubic-bezier(0.22, 1, 0.36, 1);
  }

  /* Level button hover lift */
  .level-btn:not(.locked):hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 12px rgba(124,58,237,0.25);
  }
  .level-btn { transition: all 0.2s cubic-bezier(0.22, 1, 0.36, 1); }

  /* Topic block slide-in stagger */
  .topic-block {
    animation: fadeUp 0.35s ease both;
  }

  /* Next button shimmer */
  .btn-big {
    position: relative;
    overflow: hidden;
  }
  .btn-big::after {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 60%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
    animation: shimmer 2.5s ease-in-out infinite;
  }
  @keyframes shimmer {
    0%   { left: -100%; }
    60%, 100% { left: 150%; }
  }

  /* Hearts shake when losing one */
  .hearts-row.lost {
    animation: heartLost 0.4s ease;
  }
  @keyframes heartLost {
    0%   { transform: scale(1); }
    30%  { transform: scale(1.2); }
    60%  { transform: scale(0.9); }
    100% { transform: scale(1); }
  }

  /* Premium profile screen bg particles */
  #screen-profiles::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: 
      radial-gradient(ellipse at 20% 20%, rgba(124,58,237,0.15) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 80%, rgba(168,85,247,0.1) 0%, transparent 60%),
      radial-gradient(ellipse at 50% 50%, rgba(251,191,36,0.05) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }
  #screen-profiles > * { position: relative; z-index: 1; }

  /* Home title shimmer text */
  .home-title {
    background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 40%, #fde68a 60%, #fbbf24 100%);
    background-size: 200% auto;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: titleShimmer 3s linear infinite;
  }
  @keyframes titleShimmer {
    0%   { background-position: 0% center; }
    100% { background-position: 200% center; }
  }

  /* XP badge glow */
  .home-xp {
    animation: xpGlow 2s ease-in-out infinite;
  }
  @keyframes xpGlow {
    0%, 100% { filter: drop-shadow(0 0 4px rgba(251,191,36,0.3)); }
    50%       { filter: drop-shadow(0 0 10px rgba(251,191,36,0.6)); }
  }

  /* Subject card ripple on tap */
  .subject-card {
    position: relative;
    overflow: hidden;
  }
  .subject-card::after {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at center, rgba(255,255,255,0.08) 0%, transparent 70%);
    opacity: 0;
    transition: opacity 0.3s;
  }
  .subject-card:active::after { opacity: 1; }

  /* Smooth feedback box appear */
  .feedback-box.correct, .feedback-box.wrong {
    animation: feedbackSlide 0.3s cubic-bezier(0.22, 1, 0.36, 1) both;
  }
  @keyframes feedbackSlide {
    from { opacity: 0; transform: translateY(8px); max-height: 0; }
    to   { opacity: 1; transform: translateY(0); max-height: 100px; }
  }

  /* Papa dashboard hero float */
  .papa-hero {
    animation: heroFloat 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both;
  }
  @keyframes heroFloat {
    from { opacity: 0; transform: translateY(-20px) scale(0.95); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* Stat cards pop */
  .papa-stat {
    animation: cardPop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) both;
  }
  .papa-stat:nth-child(1) { animation-delay: 0.1s; }
  .papa-stat:nth-child(2) { animation-delay: 0.18s; }
  .papa-stat:nth-child(3) { animation-delay: 0.26s; }

  /* Modal pop */
  .modal {
    animation: modalPop 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) both;
  }
  @keyframes modalPop {
    from { opacity: 0; transform: scale(0.88) translateY(20px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }

  /* Toast slide */
  .toast.show {
    animation: toastIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) both;
  }
  @keyframes toastIn {
    from { opacity: 0; transform: translateX(-50%) translateY(20px) scale(0.9); }
    to   { opacity: 1; transform: translateX(-50%) translateY(0) scale(1); }
  }

  /* Pulse ring on current level btn */
  .level-btn.current::before {
    content: '';
    position: absolute;
    inset: -3px;
    border-radius: 14px;
    border: 2px solid var(--accent2);
    animation: ringPulse 1.8s ease-in-out infinite;
    pointer-events: none;
  }
  .level-btn { position: relative; }
  @keyframes ringPulse {
    0%, 100% { opacity: 0.6; transform: scale(1); }
    50%       { opacity: 0.15; transform: scale(1.06); }
  }

</style>
</head>

function getUserData(userId) {
  const key = `as3_${userId}`;
  const raw = localStorage.getItem(key);
  if (raw) return JSON.parse(raw);
  return { xp: 0, levels: {} };
}

function saveUserData(userId, data) {
  localStorage.setItem(`as3_${userId}`, JSON.stringify(data));
}

function getLevelKey(subjectId, topicIdx, levelIdx) {
  return `${subjectId}_${topicIdx}_${levelIdx}`;
}

function getLevelStars(userId, subjectId, topicIdx, levelIdx) {
  const data = getUserData(userId);
  return data.levels[getLevelKey(subjectId, topicIdx, levelIdx)] || 0;
}

function isLevelUnlocked(userId, subjectId, topicIdx, levelIdx) {
  if (topicIdx === 0 && levelIdx === 0) return true;
  // Check if previous level in same topic is done
  if (levelIdx > 0) {
    return getLevelStars(userId, subjectId, topicIdx, levelIdx - 1) > 0;
  }
  // First level of a topic: check if previous topic's last level is done
  if (topicIdx > 0) {
    const subj = getSubjects().find(s => s.id === subjectId);
    const prevTopic = subj.topics[topicIdx - 1];
    const lastLevel = prevTopic.levels.length - 1;
    return getLevelStars(userId, subjectId, topicIdx - 1, lastLevel) > 0;
  }
  return false;
}

  }
}
function loadProfiles() {
  try {
    const raw = localStorage.getItem('as3_profiles');
    if (raw) {
      state.profiles = JSON.parse(raw);
    } else {
      state.profiles = [...DEFAULT_PROFILES];

function renderSubjects() {
  const grid = document.getElementById('subjects-grid');
  grid.innerHTML = '';
  const userId = state.currentUserId;

  getSubjects().forEach(s => {
    const data = getUserData(userId);
    let totalLevels = 0;
    let completedLevels = 0;
    s.topics.forEach((t, ti) => {
      t.levels.forEach((_, li) => {
        totalLevels++;
        if ((data.levels[getLevelKey(s.id, ti, li)] || 0) > 0) completedLevels++;
      });
    });
    const pct = totalLevels > 0 ? Math.round(completedLevels / totalLevels * 100) : 0;

      <div class="subject-icon">${s.icon}</div>

      <div class="subject-progress-text">${completedLevels}/${totalLevels} niveles</div>

  document.getElementById('subj-name').textContent = subj.name;

function renderTopics(subj) {
  const list = document.getElementById('topics-list');
  list.innerHTML = '';
  const userId = state.currentUserId;

  subj.topics.forEach((topic, ti) => {
    const topicUnlocked = isLevelUnlocked(userId, subj.id, ti, 0);
    const topicStars = topic.levels.reduce((sum, _, li) =>
      sum + getLevelStars(userId, subj.id, ti, li), 0);

    const block = document.createElement('div');
    block.className = 'topic-block' + (!topicUnlocked ? ' topic-locked' : '');

    const levelsHTML = topic.levels.map((_, li) => {
      const stars = getLevelStars(userId, subj.id, ti, li);
      const unlocked = isLevelUnlocked(userId, subj.id, ti, li);
      const isCurrent = unlocked && stars === 0;

      let cls = 'level-btn';
      if (!unlocked) cls += ' locked';
      else if (stars > 0) cls += ' completed';
      else cls += ' current';

      const icon = !unlocked ? '🔒' : stars > 0 ? '✅' : `${li + 1}`;
      const starsDisplay = stars > 0 ? '⭐'.repeat(stars) : '';

      return `<button class="${cls}" ${unlocked ? `onclick="startLevel('${subj.id}',${ti},${li})"` : ''}>
        <div class="level-btn-num">Nv${li + 1}</div>
        <div class="level-btn-icon">${icon}</div>
        <div class="level-btn-stars">${starsDisplay}</div>
      </button>`;
    }).join('');

    block.innerHTML = `
      <div class="topic-header">
        <div class="topic-num">${topicUnlocked ? (ti + 1) : '🔒'}</div>
        <div class="topic-name">${topic.name}</div>
        ${topicStars > 0 ? `<div class="topic-stars">${'⭐'.repeat(topicStars)}</div>` : ''}
      </div>
      <div class="levels-row">${levelsHTML}</div>
    `;
    list.appendChild(block);
  });
}

function startLevel(subjectId, topicIdx, levelIdx) {
  state.currentSubjectId = subjectId;
  state.currentTopicIdx = topicIdx;
  state.currentLevelIdx = levelIdx;

  const subj = getSubjects().find(s => s.id === subjectId);
  const topic = subj.topics[topicIdx];
  state.questions = [...topic.levels[levelIdx]];
  state.questionIdx = 0;
  state.hearts = 3;
  state.correct = 0;
  state.answered = false;

  const subName = `${topic.name} · ${LEVEL_LABELS[levelIdx]}`;
  document.getElementById('quiz-title').textContent = subName;

  recordStudyDay(state.currentUserId);
  showScreen('quiz');
  renderQuestion();
}

function renderQuestion() {
  const q = state.questions[state.questionIdx];
  const total = state.questions.length;

  document.getElementById('quiz-progress').style.width =
    ((state.questionIdx) / total * 100) + '%';

  const subj = getSubjects().find(s => s.id === state.currentSubjectId);
  const topic = subj.topics[state.currentTopicIdx];
  document.getElementById('q-badge').textContent =
    `${topic.name} · Nivel ${state.currentLevelIdx + 1} · ${LEVEL_LABELS[state.currentLevelIdx]}`;
  document.getElementById('q-text').textContent = q.q;

  const hearts = '❤️'.repeat(state.hearts) + (state.hearts < 3 ? '🖤'.repeat(3 - state.hearts) : '');
  document.getElementById('hearts-row').textContent = hearts;

  const optList = document.getElementById('options-list');
  optList.innerHTML = '';
  const letters = ['A','B','C','D'];

  q.opts.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = `<span class="option-letter">${letters[i]}</span> ${opt}`;
    btn.addEventListener('click', () => selectOption(i));
    optList.appendChild(btn);
  });

  document.getElementById('feedback-box').className = 'feedback-box';
  document.getElementById('feedback-box').textContent = '';
  document.getElementById('next-btn').style.display = 'none';
  state.answered = false;
}

function selectOption(optIdx) {
  if (state.answered) return;
  state.answered = true;

  const q = state.questions[state.questionIdx];
  const opts = document.querySelectorAll('.option-btn');
  opts.forEach(b => b.disabled = true);

  const feedback = document.getElementById('feedback-box');

  if (optIdx === q.ans) {
    opts[optIdx].classList.add('correct');
    state.correct++;
    feedback.className = 'feedback-box correct';
    feedback.textContent = '✅ ¡Correcto!';
    playSound('correct');
  } else {
    opts[optIdx].classList.add('wrong');
    opts[q.ans].classList.add('correct');
    state.hearts--;
    animateHeartLoss();
    feedback.className = 'feedback-box wrong';
    feedback.textContent = `❌ Respuesta correcta: ${q.opts[q.ans]}`;

    if (state.hearts <= 0) {
      setTimeout(() => endQuiz(false), 1200);
      return;
    }
  }

  document.getElementById('next-btn').style.display = 'block';

  if (state.questionIdx >= state.questions.length - 1) {
    document.getElementById('next-btn').textContent = 'Ver resultados 🏆';
  }
}

function nextQuestion() {
  state.questionIdx++;
  if (state.questionIdx >= state.questions.length) {
    endQuiz(true);
  } else {
    renderQuestion();
  }
}

function endQuiz(completed) {
  const total = state.questions.length;
  const correct = state.correct;
  const pct = correct / total;

  let stars = 0;
  if (completed) {
    if (pct >= 0.9) stars = 3;
    else if (pct >= 0.7) stars = 2;
    else if (pct >= 0.5) stars = 1;
  }

  const xpMap = [0, 50, 100, 150];
  const xpEarned = xpMap[stars];

  // Save results
  const userId = state.currentUserId;
  const data = getUserData(userId);
  const key = getLevelKey(state.currentSubjectId, state.currentTopicIdx, state.currentLevelIdx);
  const prevStars = data.levels[key] || 0;

  if (stars > prevStars) {
    data.levels[key] = stars;
    data.xp = (data.xp || 0) + (xpEarned - xpMap[prevStars]);
    saveUserData(userId, data);
    document.getElementById('current-xp').textContent = data.xp;
  }

  // Show results
  const emojis = ['😓','😐','😊','🌟'];
  const titles = ['¡Sigue intentando!','¡No está mal!','¡Bien hecho!','¡Excelente!'];

  document.getElementById('results-emoji').textContent = completed ? emojis[stars] : '💔';
  document.getElementById('results-title').textContent = completed ? titles[stars] : '¡Sin vidas!';
  document.getElementById('results-subtitle').textContent =
    completed ? `Nivel ${state.currentLevelIdx + 1} completado` : 'Se acabaron los corazones';
  document.getElementById('results-stars').textContent = stars > 0 ? '⭐'.repeat(stars) : '☆☆☆';
  document.getElementById('results-score').textContent = `${correct}/${total} correctas`;
  document.getElementById('results-xp').textContent = xpEarned > 0 ? `+${xpEarned} XP` : '0 XP';

  // Papa messages
  const msgs = [
    [`Santi, no te preocupes. <strong>Cada intento te hace más fuerte.</strong> ¡Inténtalo de nuevo, campeón!`,
     `Santi, el Real Madrid también pierde partidos... <strong>¡pero siempre vuelve más fuerte!</strong> ¡Tú puedes!`],
    [`Bien Santi, vas avanzando. <strong>Con más práctica lo dominarás.</strong> ¡Tú puedes más!`,
     `¡Vamos Santi! El esfuerzo se nota. <strong>Sigue practicando y llegarás al nivel de Mbappé.</strong> 💪`],
    [`¡Muy bien Santi! <strong>Estás progresando de verdad.</strong> Papá está orgulloso de ti. 🌟`,
     `¡Excelente trabajo! <strong>Así se hace, con dedicación.</strong> Papá te ve y sonríe. ⚽❤️`],
    [`¡CRACK! <strong>Eso es nivel Real Madrid, hijo.</strong> Papá está súper orgulloso. ¡Tres estrellitas! 🏆⭐⭐⭐`,
     `¡GOLAZO ACADÉMICO! <strong>Eres el Mbappé de las matemáticas.</strong> Papá te quiere muchísimo. 🌟`]
  ];

  const msgList = msgs[stars];
  document.getElementById('papa-msg').innerHTML = '💬 ' + msgList[Math.floor(Math.random() * msgList.length)];

  // Next button
  const subj = getSubjects().find(s => s.id === state.currentSubjectId);
  const topic = subj.topics[state.currentTopicIdx];
  const hasNext = state.currentLevelIdx < topic.levels.length - 1 ||
                  state.currentTopicIdx < subj.topics.length - 1;

  const nextBtn = document.getElementById('results-next-btn');
  if (stars > 0 && hasNext) {
    nextBtn.style.display = 'block';
    nextBtn.textContent = 'Siguiente nivel →';
  } else if (stars === 0) {
    nextBtn.style.display = 'block';
    nextBtn.textContent = 'Intentar de nuevo 🔄';
  } else {
    nextBtn.style.display = 'none';
  }

  if (stars === 3) { setTimeout(() => { launchConfetti(); playSound('star3'); }, 300); } else if (stars > 0) { setTimeout(() => playSound('correct'), 300); }
  showScreen('results');
}

function continueAfterResults() {
  const stars = getLevelStars(state.currentUserId, state.currentSubjectId,
    state.currentTopicIdx, state.currentLevelIdx);

  if (stars === 0) {
    // Retry
    startLevel(state.currentSubjectId, state.currentTopicIdx, state.currentLevelIdx);
    return;
  }

  const subj = getSubjects().find(s => s.id === state.currentSubjectId);

  // Next level in same topic
  if (state.currentLevelIdx < subj.topics[state.currentTopicIdx].levels.length - 1) {
    startLevel(state.currentSubjectId, state.currentTopicIdx, state.currentLevelIdx + 1);
  } else if (state.currentTopicIdx < subj.topics.length - 1) {
    // First level of next topic
    startLevel(state.currentSubjectId, state.currentTopicIdx + 1, 0);
  } else {
    goToSubject();
  }
}

function goToSubject() {
  const subj = getSubjects().find(s => s.id === state.currentSubjectId);
  openSubject(state.currentSubjectId);
}

        total++;
        const st = levels[getLevelKey(s.id, ti, li)] || 0;
        if (st > 0) { done++; stars += st; }
      });
    });
    const pct = total > 0 ? Math.round(done/total*100) : 0;
    const color = subjectColors[s.id] || '#7c3aed';
    const row = document.createElement('div');
    row.className = 'papa-subject-row';
    row.innerHTML = `
      <div class="papa-subject-top">
        <div class="papa-subject-icon">${s.icon}</div>
        <div class="papa-subject-name">${s.name}</div>
        <div class="papa-subject-pct" style="color:${color}">${pct}%</div>
      </div>
      <div class="papa-subject-bar">
        <div class="papa-subject-fill" style="width:${pct}%;background:${color}"></div>
      </div>
      <div style="font-size:0.72rem;color:var(--muted);margin-top:0.4rem;">${done}/${total} niveles · ${stars} ⭐</div>
    `;
    matSection.appendChild(row);
  });
  body.appendChild(matSection);

  // ---- PUNTOS DEBILES Y FUERTES ----
  const areaData = [];
  getSubjects().forEach(s => {
    s.topics.forEach((t, ti) => {
      let topicDone = 0, topicStars = 0, topicTotal = t.levels.length;
      t.levels.forEach((_, li) => {
        const st = levels[getLevelKey(s.id, ti, li)] || 0;
        if (st > 0) { topicDone++; topicStars += st; }
      });
      if (topicDone > 0) {
        areaData.push({
          subject: s.name, icon: s.icon, topic: t.name,
          done: topicDone, total: topicTotal,
          stars: topicStars, maxStars: topicTotal * 3,
          pct: Math.round(topicDone/topicTotal*100),
          avgStars: topicStars / topicDone
        });
      }
    });
  });

  if (areaData.length > 0) {
    // Sort by avgStars
    const sorted = [...areaData].sort((a,b) => a.avgStars - b.avgStars);
    const weak = sorted.slice(0, Math.min(3, sorted.length));
    const strong = sorted.slice(-Math.min(3, sorted.length)).reverse();

    const weakSection = document.createElement('div');
    weakSection.className = 'papa-section';
    weakSection.innerHTML = '<div class="papa-section-title">⚠️ Áreas a reforzar</div>';
    weak.forEach(a => {
      const card = document.createElement('div');
      card.className = 'papa-area-card';
      card.innerHTML = `
        <div class="papa-area-badge weak">${a.icon}</div>
        <div class="papa-area-info">
          <div class="papa-area-name">${a.topic}</div>
          <div class="papa-area-detail">${a.subject} · ${a.done}/${a.total} niveles completados</div>
        </div>
        <div class="papa-area-stars">${'⭐'.repeat(Math.round(a.avgStars)) || '☆'}</div>
      `;
      weakSection.appendChild(card);
    });
    body.appendChild(weakSection);

    const strongSection = document.createElement('div');
    strongSection.className = 'papa-section';
    strongSection.innerHTML = '<div class="papa-section-title">🏆 Puntos fuertes</div>';
    strong.forEach(a => {
      const card = document.createElement('div');
      card.className = 'papa-area-card';
      card.innerHTML = `
        <div class="papa-area-badge strong">${a.icon}</div>
        <div class="papa-area-info">
          <div class="papa-area-name">${a.topic}</div>
          <div class="papa-area-detail">${a.subject} · ${a.pct}% completado</div>
        </div>
        <div class="papa-area-stars">${'⭐'.repeat(Math.round(a.avgStars))}</div>
      `;
      strongSection.appendChild(card);
    });
    body.appendChild(strongSection);
  } else {
    const empty = document.createElement('div');
    empty.className = 'papa-empty';
    empty.innerHTML = '🎮 Santi aún no ha completado ningún nivel.<br><span style="font-size:0.85rem">¡Anímalos a empezar!</span>';
    body.appendChild(empty);
  }

  // ---- DIAS ESTUDIADOS ----
  if (studyDays.length > 0) {
    const daysSection = document.createElement('div');
    daysSection.className = 'papa-section';
    daysSection.innerHTML = '<div class="papa-section-title">📅 Días que ha estudiado</div>';
    const grid = document.createElement('div');
    grid.className = 'papa-days-grid';
    studyDays.slice(-20).forEach(d => {
      const chip = document.createElement('div');
      chip.className = 'papa-day-chip studied';
      chip.textContent = d;
      grid.appendChild(chip);
    });
    daysSection.appendChild(grid);
    body.appendChild(daysSection);
  }

  showScreen('papa');
}

function getStudyDays(userId) {
  const key = `as3_days_${userId}`;
  const raw = localStorage.getItem(key);
  return raw ? JSON.parse(raw) : [];
}

function recordStudyDay(userId) {
  const key = `as3_days_${userId}`;
  const today = new Date().toLocaleDateString('es-MX', {day:'2-digit', month:'short'});
  const days = getStudyDays(userId);
  if (!days.includes(today)) {
    days.push(today);
    localStorage.setItem(key, JSON.stringify(days));
  }
}

// Confetti
function launchConfetti() {
  const canvas = document.getElementById('confetti-canvas');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  const colors = ['#fbbf24','#a855f7','#10b981','#3b82f6','#f472b6','#f87171','#34d399'];
  const particles = Array.from({length: 80}, () => ({
    x: Math.random() * canvas.width,
    y: -10 - Math.random() * 100,
    r: 4 + Math.random() * 6,
    color: colors[Math.floor(Math.random() * colors.length)],
    vx: (Math.random() - 0.5) * 3,
    vy: 2 + Math.random() * 4,
    rotation: Math.random() * 360,
    rotSpeed: (Math.random() - 0.5) * 8,
    shape: Math.random() > 0.5 ? 'rect' : 'circle',
    opacity: 1
  }));

  let frame = 0;
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles.forEach(p => {
      ctx.save();
      ctx.globalAlpha = p.opacity;
      ctx.fillStyle = p.color;
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation * Math.PI / 180);
      if (p.shape === 'rect') {
        ctx.fillRect(-p.r, -p.r/2, p.r*2, p.r);
      } else {
        ctx.beginPath();
        ctx.arc(0, 0, p.r, 0, Math.PI*2);
        ctx.fill();
      }
      ctx.restore();
      p.x += p.vx;
      p.y += p.vy;
      p.rotation += p.rotSpeed;
      if (p.y > canvas.height * 0.6) p.opacity -= 0.02;
    });
    frame++;
    if (frame < 120) requestAnimationFrame(draw);
    else ctx.clearRect(0, 0, canvas.width, canvas.height);
  }
  draw();
}

// Sound effects (Web Audio API — no external files needed)
function playSound(type) {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    gain.gain.setValueAtTime(0.15, ctx.currentTime);

    if (type === 'correct') {
      osc.frequency.setValueAtTime(520, ctx.currentTime);
      osc.frequency.setValueAtTime(660, ctx.currentTime + 0.1);
      osc.frequency.setValueAtTime(800, ctx.currentTime + 0.2);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 0.4);
    } else if (type === 'wrong') {
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(300, ctx.currentTime);
      osc.frequency.setValueAtTime(200, ctx.currentTime + 0.15);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 0.3);
    } else if (type === 'star3') {
      // Victory fanfare
      [523, 659, 784, 1047].forEach((freq, i) => {
        const o = ctx.createOscillator();
        const g = ctx.createGain();
        o.connect(g); g.connect(ctx.destination);
        o.frequency.value = freq;
        g.gain.setValueAtTime(0.12, ctx.currentTime + i*0.12);
        g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i*0.12 + 0.3);
        o.start(ctx.currentTime + i*0.12);
        o.stop(ctx.currentTime + i*0.12 + 0.3);
      });
    }
  } catch(e) {}
}

// Animate hearts row when losing a heart
function animateHeartLoss() {
  const row = document.getElementById('hearts-row');
  row.classList.remove('lost');
  void row.offsetWidth; // reflow
  row.classList.add('lost');
  setTimeout(() => row.classList.remove('lost'), 500);
}

// Screen transition with direction
function showScreenAnimated(name) {
  const current = document.querySelector('.screen.active');
  const next = document.getElementById('screen-' + name);
  if (!next || current === next) return;
  current.classList.remove('active');
  next.classList.add('active');
}
